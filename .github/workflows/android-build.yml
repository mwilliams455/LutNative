name: Android Release Build

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        env:
          BUILT_IN_API_KEY: ${{ secrets.BUILT_IN_API_KEY }}
          BUILT_IN_API_KEY_GOOGLE: ${{ secrets.BUILT_IN_API_KEY_GOOGLE }}
        run: |
          {
            printf 'BUILT_IN_API_KEY=%s\n' "$BUILT_IN_API_KEY"
            printf 'BUILT_IN_API_KEY_GOOGLE=%s\n' "$BUILT_IN_API_KEY_GOOGLE"
          } > local.properties

      - name: Decode Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 --decode > app/release.keystore

      - name: Build Release APKs
        run: |
          ./gradlew assembleDefaultRelease assembleSamsungRelease assembleMeituRelease \
            -PRELEASE_STORE_FILE=release.keystore \
            -PRELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -PRELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PRELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Release APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            app/build/outputs/apk/default/release/*.apk
            app/build/outputs/apk/samsung/release/*.apk
            app/build/outputs/apk/meitu/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
